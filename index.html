  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface-2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --muted: #6b6560;
    --accent: #c8a96e;
    --accent-dim: rgba(200, 169, 110, 0.12);
    --active: #e8c97a;
    --green: #4caf7d;
    --red: #e05252;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,169,110,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(200,169,110,0.03) 0%, transparent 70%);
  }

  .player { width: 100%; max-width: 520px; }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .badge {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .search-box { position: relative; margin-bottom: 1.2rem; }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.9rem 2.8rem 0.9rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; right: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 14px; height: 14px;
    pointer-events: none;
  }

  .country-row {
    display: flex; gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.75rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .chip:hover { color: var(--text); border-color: var(--accent-dim); }

  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .chip.fav-chip.active {
    background: rgba(200, 169, 110, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .now-playing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.5rem;
    min-height: 90px;
  }

  .station-name {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    transition: color 0.3s;
    margin-bottom: 0.5rem;
  }

  .station-name.playing { color: var(--active); }

  .stream-meta {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .dot.live {
    background: var(--green);
    box-shadow: 0 0 6px rgba(76, 175, 125, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  .dot.error { background: var(--red); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding: 0 0.2rem;
  }

  .play-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .play-btn:hover { background: var(--accent-dim); border-color: var(--active); color: var(--active); }
  .play-btn:active { transform: scale(0.95); }
  .play-btn svg { width: 18px; height: 18px; }

  .volume-wrap { display: flex; align-items: center; gap: 0.6rem; flex: 1; }
  .vol-icon { color: var(--muted); width: 14px; height: 14px; flex-shrink: 0; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 2px;
    background: var(--border);
    border-radius: 1px; outline: none; cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .vol-pct { font-size: 0.65rem; color: var(--muted); width: 2.5rem; text-align: right; }

  .list-header {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    display: flex;
    justify-content: space-between;
  }

  .station-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    max-height: 480px;
    overflow-y: auto;
  }

  .station-list::-webkit-scrollbar { width: 6px; }
  .station-list::-webkit-scrollbar-track { background: var(--surface); }
  .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .station-item {
    background: var(--surface);
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: background 0.15s;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .station-item:hover { background: var(--surface-2); }

  .station-item.active {
    background: var(--accent-dim);
    border-left: 2px solid var(--accent);
    padding-left: calc(1.2rem - 2px);
  }

  .station-favicon {
    width: 28px; height: 28px;
    border-radius: 3px;
    background: var(--bg);
    flex-shrink: 0;
    object-fit: cover;
    opacity: 0.85;
  }

  .station-favicon.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .station-info { flex: 1; min-width: 0; }

  .s-name {
    font-size: 0.85rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.15rem;
  }

  .station-item.active .s-name { color: var(--active); }

  .s-desc {
    font-size: 0.62rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.05em;
  }

  .s-indicator {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0; flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .station-item.active .s-indicator { opacity: 1; }

  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
    flex-shrink: 0;
    line-height: 0;
    transition: color 0.15s, transform 0.15s;
    border-radius: 3px;
  }

  .fav-btn:hover { color: var(--accent); transform: scale(1.15); }
  .fav-btn.saved { color: var(--accent); }
  .fav-btn svg { width: 14px; height: 14px; display: block; }

  .empty-state {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    line-height: 1.8;
  }

  footer span { color: var(--border); }
  footer a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--border); }
  footer a:hover { color: var(--accent); }

  audio { display: none; }
</style>
</head>
<body>

<div class="player">
  <header>
    <h1>Radio</h1>
    <div class="badge">no tracking</div>
  </header>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="Search stations — try 'Heart', 'Nation Radio', 'jazz'..." autocomplete="off">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
    </svg>
  </div>

  <div class="country-row">
    <button class="chip fav-chip" data-view="favourites">&#9733; Favourites</button>
    <button class="chip active" data-country="United Kingdom">UK</button>
    <button class="chip" data-country="Ireland">Ireland</button>
    <button class="chip" data-country="United States Of America">USA</button>
    <button class="chip" data-country="">Worldwide</button>
  </div>

  <div class="now-playing" id="nowPlaying">
    <div class="station-name" id="npName">No station selected</div>
    <div class="stream-meta">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">—</span>
    </div>
  </div>

  <div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()" title="Play / Pause">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <div class="volume-wrap">
      <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="vol" min="0" max="100" value="80" oninput="setVol(this.value)">
      <span class="vol-pct" id="volPct">80%</span>
    </div>
  </div>

  <div class="list-header">
    <span id="listLabel">Top UK stations</span>
    <span id="resultCount"></span>
  </div>

  <div class="station-list" id="stationList">
    <div class="empty-state"><span class="spinner"></span>Loading stations…</div>
  </div>

  <footer>
    Powered by <a href="https://www.radio-browser.info" target="_blank" rel="noopener">radio-browser.info</a> &nbsp;<span>·</span>&nbsp; Open data &nbsp;<span>·</span>&nbsp; No ads<br>
    Direct stream connection &nbsp;<span>·</span>&nbsp; Your IP is visible to the stream server
  </footer>
</div>

<audio id="audio" preload="none"></audio>

<script>
const API_HOSTS = [
  'https://de1.api.radio-browser.info',
  'https://de2.api.radio-browser.info',
  'https://at1.api.radio-browser.info',
  'https://nl1.api.radio-browser.info'
];

// Filter out HTTP-only streams when page is served over HTTPS
function filterStreams(stations) {
  const isSecure = location.protocol === 'https:';
  if (!isSecure) return stations;
  return stations.filter(s => {
    const url = s.url_resolved || s.url || '';
    return url.startsWith('https://');
  });
}

let currentCountry = 'United Kingdom';
let searchTimer = null;
let currentStation = null;
let isPlaying = false;
let stations = [];
let viewingFavourites = false;

const audio = document.getElementById('audio');
const playIcon = document.getElementById('playIcon');
const npName = document.getElementById('npName');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const volEl = document.getElementById('vol');
const volPct = document.getElementById('volPct');
const list = document.getElementById('stationList');
const searchInput = document.getElementById('searchInput');
const listLabel = document.getElementById('listLabel');
const resultCount = document.getElementById('resultCount');

const PLAY_SVG = `<path d="M8 5v14l11-7z"/>`;
const PAUSE_SVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
const STAR_EMPTY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const STAR_FILLED = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

function loadFavourites() {
  try { return JSON.parse(localStorage.getItem('radio_favourites') || '[]'); }
  catch { return []; }
}

function saveFavourites(favs) {
  localStorage.setItem('radio_favourites', JSON.stringify(favs));
}

function isFavourite(uuid) {
  return loadFavourites().some(f => f.stationuuid === uuid);
}

function toggleFavourite(s, e) {
  e.stopPropagation();
  let favs = loadFavourites();
  const idx = favs.findIndex(f => f.stationuuid === s.stationuuid);
  if (idx === -1) {
    favs.push(s);
  } else {
    favs.splice(idx, 1);
  }
  saveFavourites(favs);
  if (viewingFavourites) {
    stations = loadFavourites();
    listLabel.textContent = 'Favourites';
  }
  renderList();
}

async function apiFetch(path) {
  const hosts = [...API_HOSTS].sort(() => Math.random() - 0.5);
  let lastErr;
  for (const h of hosts) {
    try {
      const res = await fetch(h + path, {
        headers: { 'Accept': 'application/json', 'User-Agent': 'RadioPlayer/1.0' }
      });
      if (res.ok) return await res.json();
      lastErr = new Error('HTTP ' + res.status);
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('All API hosts failed');
}

async function loadTopForCountry(country) {
  viewingFavourites = false;
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading stations…</div>';
  try {
    const params = new URLSearchParams({
      limit: '60',
      hidebroken: 'true',
      order: 'clickcount',
      reverse: 'true'
    });
    if (country) params.set('country', country);
    const data = await apiFetch('/json/stations/search?' + params.toString());
    stations = filterStreams(data);
    listLabel.textContent = country ? `Top ${country} stations` : 'Top stations worldwide';
    renderList();
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Couldn't reach radio-browser API.<br><small style="opacity:0.6">${e.message}</small></div>`;
  }
}

function showFavourites() {
  viewingFavourites = true;
  searchInput.value = '';
  stations = loadFavourites();
  listLabel.textContent = 'Favourites';
  renderList();
}

async function doSearch(q) {
  if (!q.trim()) {
    if (viewingFavourites) { showFavourites(); return; }
    loadTopForCountry(currentCountry);
    return;
  }
  viewingFavourites = false;
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span>Searching…</div>';
  try {
    const params = new URLSearchParams({
      name: q,
      limit: '60',
      hidebroken: 'true',
      order: 'clickcount',
      reverse: 'true'
    });
    if (currentCountry) params.set('country', currentCountry);
    const data = await apiFetch('/json/stations/search?' + params.toString());
    stations = filterStreams(data);
    listLabel.textContent = `Results for "${q}"`;
    renderList();
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Search failed.<br><small style="opacity:0.6">${e.message}</small></div>`;
  }
}

function renderList() {
  if (!stations.length) {
    list.innerHTML = viewingFavourites
      ? '<div class="empty-state">No favourites yet — star a station to save it here</div>'
      : '<div class="empty-state">No stations found</div>';
    resultCount.textContent = '';
    return;
  }
  resultCount.textContent = stations.length + (stations.length === 60 ? '+' : '');
  list.innerHTML = '';
  stations.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'station-item' + (currentStation && currentStation.stationuuid === s.stationuuid ? ' active' : '');
    const tags = (s.tags || '').split(',').map(t => t.trim()).filter(Boolean).slice(0, 2).join(' · ');
    const desc = [s.country, s.bitrate ? s.bitrate + 'kbps' : null, tags].filter(Boolean).join(' · ');
    const initial = (s.name || '?').trim().charAt(0).toUpperCase();
    const favImg = s.favicon
      ? `<img src="${escapeAttr(s.favicon)}" class="station-favicon" onerror="this.outerHTML='<div class=\\'station-favicon placeholder\\'>${escapeAttr(initial)}</div>'">`
      : `<div class="station-favicon placeholder">${escapeHtml(initial)}</div>`;
    btn.innerHTML = `
      ${favImg}
      <div class="station-info">
        <div class="s-name">${escapeHtml(s.name)}</div>
        <div class="s-desc">${escapeHtml(desc)}</div>
      </div>
      <div class="s-indicator"></div>
    `;
    btn.onclick = () => selectStation(s);

    const favBtn = document.createElement('button');
    favBtn.className = 'fav-btn' + (isFavourite(s.stationuuid) ? ' saved' : '');
    favBtn.title = isFavourite(s.stationuuid) ? 'Remove from favourites' : 'Add to favourites';
    favBtn.innerHTML = isFavourite(s.stationuuid) ? STAR_FILLED : STAR_EMPTY;
    favBtn.onclick = (e) => toggleFavourite(s, e);
    btn.appendChild(favBtn);

    list.appendChild(btn);
  });
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function selectStation(s) {
  currentStation = s;
  npName.textContent = s.name;
  npName.className = 'station-name playing';
  setStatus('loading');
  const streamUrl = s.url_resolved || s.url;
  audio.src = streamUrl;
  audio.volume = volEl.value / 100;
  audio.play().catch(() => setStatus('error'));
  isPlaying = true;
  playIcon.innerHTML = PAUSE_SVG;
  renderList();
}

function togglePlay() {
  if (!currentStation) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    playIcon.innerHTML = PLAY_SVG;
    setStatus('idle');
  } else {
    audio.play().catch(() => setStatus('error'));
    isPlaying = true;
    playIcon.innerHTML = PAUSE_SVG;
    setStatus('loading');
  }
}

function setVol(v) { audio.volume = v / 100; volPct.textContent = v + '%'; }

function setStatus(state) {
  statusDot.className = 'dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  const labels = {
    idle: 'Paused',
    loading: 'Connecting…',
    live: 'Live',
    error: 'Stream unavailable — try another'
  };
  statusText.textContent = labels[state] || '—';
}

audio.addEventListener('playing', () => setStatus('live'));
audio.addEventListener('waiting', () => setStatus('loading'));
audio.addEventListener('error', () => setStatus('error'));
audio.addEventListener('stalled', () => setStatus('loading'));

document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    if (c.dataset.view === 'favourites') {
      showFavourites();
    } else {
      currentCountry = c.dataset.country;
      if (searchInput.value.trim()) doSearch(searchInput.value);
      else loadTopForCountry(currentCountry);
    }
  };
});

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value), 350);
});

loadTopForCountry(currentCountry);
</script>
</body>
</html>
